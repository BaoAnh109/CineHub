<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineHub | Xác nhận đặt vé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../Css/Style.css" />
  </head>
  <body data-page="booking">
    <div id="site-header"></div>

    <main class="section-spacing page-offset">
      <div class="container">
        <div class="booking-stepper mb-4">
          <div class="step completed">1. Chọn lịch chiếu</div>
          <div class="step completed">2. Chọn ghế</div>
          <div class="step active">3. Nhập thông tin</div>
        </div>

        <div class="row g-4">
          <div class="col-lg-7">
            <div class="form-panel">
              <div id="booking-alert"></div>
              <h1 class="h3 mb-4">Thông tin người đặt vé</h1>
              <form id="booking-form" novalidate>
                <div class="row g-3">
                  <div class="col-12">
                    <label for="customer-name" class="form-label">Họ và tên</label>
                    <input type="text" class="form-control" id="customer-name" placeholder="Nguyễn Văn A" required />
                  </div>
                  <div class="col-md-6">
                    <label for="customer-phone" class="form-label">Số điện thoại</label>
                    <input type="tel" class="form-control" id="customer-phone" placeholder="09xxxxxxxx" required />
                  </div>
                  <div class="col-md-6">
                    <label for="customer-email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="customer-email" placeholder="ban@example.com" required />
                  </div>
                </div>

                <div class="mt-4 d-flex flex-wrap gap-3">
                  <a href="SeatSelection.html" id="back-to-seat-btn" class="btn btn-cine-outline">Quay lại chọn ghế</a>
                  <button type="submit" class="btn btn-cine-primary">Xác nhận đặt vé</button>
                </div>
              </form>
            </div>
          </div>

          <div class="col-lg-5">
            <div class="summary-card sticky-summary">
              <h2 class="h4 mb-3">Tóm tắt đơn hàng</h2>
              <div id="booking-summary"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/Storage.js"></script>
    <script src="../Js/Main.js"></script>
    <script src="../Js/Booking.js"></script>
  </body>
</html>
