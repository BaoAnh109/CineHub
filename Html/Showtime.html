<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineHub | Chọn lịch chiếu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../Css/Style.css" />
  </head>
  <body data-page="showtime">
    <div id="site-header"></div>

    <main class="section-spacing page-offset">
      <div class="container">
        <div id="showtime-banner" class="mb-4"></div>

        <div class="booking-stepper mb-4">
          <div class="step active">1. Chọn lịch chiếu</div>
          <div class="step">2. Chọn ghế</div>
          <div class="step">3. Thanh toán</div>
        </div>

        <div class="filter-panel mb-4">
          <h2 class="h4 mb-3">Chọn ngày xem</h2>
          <div id="date-selector" class="date-selector"></div>
        </div>

        <div class="row g-4" id="showtime-list"></div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/Storage.js"></script>
    <script src="../Js/Main.js"></script>
    <script src="../Js/Showtime.js"></script>
  </body>
</html>
