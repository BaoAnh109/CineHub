<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineHub | Combo bắp nước</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../Css/Style.css" />
  </head>
  <body data-page="combos">
    <div id="site-header"></div>

    <main class="section-spacing page-offset">
      <div class="container">
        <div class="page-title-block">
          <span class="section-subtitle">Concessions</span>
          <h1>Combo bắp nước</h1>
          <p>Thêm combo trong lúc đặt vé hoặc đặt combo riêng ngay tại đây để nhận mã đơn nhanh chóng.</p>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <section class="mb-4">
              <div class="d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-stars text-warning"></i>
                <h2 class="h4 mb-0">Combo nổi bật</h2>
              </div>
              <div class="row g-3" id="featured-combo-list"></div>
            </section>

            <section>
              <div class="d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-cup-hot text-warning"></i>
                <h2 class="h4 mb-0">Các combo khác</h2>
              </div>
              <div class="row g-3" id="other-combo-list"></div>
            </section>
          </div>

          <div class="col-lg-4">
            <aside class="summary-card sticky-summary">
              <div id="combo-alert"></div>
              <h2 class="h4 mb-3">Đặt combo riêng</h2>
              <div id="combo-cart-summary" class="summary-list"></div>

              <form id="combo-order-form" class="mt-3" novalidate>
                <div class="row g-3">
                  <div class="col-12">
                    <label for="combo-customer-name" class="form-label">Họ và tên</label>
                    <input type="text" class="form-control" id="combo-customer-name" placeholder="Nguyễn Văn A" required />
                  </div>
                  <div class="col-12">
                    <label for="combo-customer-phone" class="form-label">Số điện thoại</label>
                    <input type="tel" class="form-control" id="combo-customer-phone" placeholder="09xxxxxxxx" required />
                  </div>
                  <div class="col-12">
                    <label for="combo-customer-email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="combo-customer-email" placeholder="ban@example.com" required />
                  </div>
                </div>

                <div class="payment-qr-card mt-3">
                  <h3 class="h6 mb-3">Thanh toán QR cho combo</h3>
                  <div class="payment-qr-image-wrap">
                    <img id="combo-payment-qr-image" class="payment-qr-image" src="" alt="Mã QR thanh toán combo" />
                  </div>
                  <div class="summary-list payment-meta mt-3 mb-0">
                    <div class="summary-item"><span>Ngân hàng</span><strong id="combo-payment-bank-name"></strong></div>
                    <div class="summary-item"><span>Số tài khoản</span><strong id="combo-payment-bank-account"></strong></div>
                    <div class="summary-item"><span>Nội dung CK</span><strong id="combo-payment-transfer-content" class="transfer-content-value"></strong></div>
                    <div class="summary-item"><span>Số tiền</span><strong id="combo-payment-transfer-amount"></strong></div>
                  </div>
                  <button id="copy-combo-transfer-content-btn" type="button" class="btn btn-cine-outline btn-sm w-100 mt-3">
                    Sao chép nội dung chuyển khoản
                  </button>
                  <div class="form-check mt-3">
                    <input class="form-check-input" type="checkbox" value="1" id="combo-qr-paid-check" />
                    <label class="form-check-label" for="combo-qr-paid-check">
                      Tôi đã hoàn tất chuyển khoản qua mã QR.
                    </label>
                  </div>
                </div>

                <button type="submit" class="btn btn-cine-primary w-100 mt-3">Xác nhận đặt combo</button>
              </form>
            </aside>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/Storage.js"></script>
    <script src="../Js/Main.js"></script>
    <script src="../Js/Combos.js"></script>
  </body>
</html>
