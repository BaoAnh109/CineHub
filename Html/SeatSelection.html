<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineHub | Chọn ghế</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../Css/Style.css" />
  </head>
  <body data-page="seat-selection">
    <div id="site-header"></div>

    <main class="section-spacing page-offset">
      <div class="container">
        <div class="booking-stepper mb-4">
          <div class="step completed">1. Chọn lịch chiếu</div>
          <div class="step active">2. Chọn ghế</div>
          <div class="step">3. Nhập thông tin</div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="seat-panel">
              <div id="seat-movie-summary" class="mb-4"></div>
              <div class="seat-legend">
                <span><i class="seat-sample available"></i> Ghế trống</span>
                <span><i class="seat-sample selected"></i> Ghế đang chọn</span>
                <span><i class="seat-sample booked"></i> Ghế đã đặt</span>
              </div>
              <div class="screen-label">Màn hình chiếu</div>
              <div id="seat-map" class="seat-map"></div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="summary-card sticky-summary">
              <h2 class="h4 mb-3">Thông tin ghế chọn</h2>
              <div id="selected-showtime" class="summary-list"></div>
              <hr class="border-secondary-subtle" />
              <div class="mb-3">
                <h3 class="h6">Ghế đã chọn</h3>
                <div id="selected-seats" class="selected-seat-tags">Chưa chọn ghế</div>
              </div>
              <div class="total-box">
                <span>Tổng tiền</span>
                <strong id="seat-total-price">0 đ</strong>
              </div>
              <button id="confirm-seat-btn" class="btn btn-cine-primary w-100 mt-3" disabled>
                Tiếp tục nhập thông tin
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/Storage.js"></script>
    <script src="../Js/Main.js"></script>
    <script src="../Js/SeatSelection.js"></script>
  </body>
</html>
