<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineHub | Vé đã đặt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../Css/Style.css" />
  </head>
  <body data-page="tickets">
    <div id="site-header"></div>

    <main class="section-spacing page-offset">
      <div class="container">
        <div class="page-title-block">
          <span class="section-subtitle">Lịch sử đặt vé</span>
          <h1>Danh sách vé đã đặt</h1>
          <p>Thông tin bên dưới được đọc trực tiếp từ `localStorage`, có thể dùng để minh họa quá trình lưu dữ liệu tạm trên trình duyệt.</p>
        </div>

        <div id="tickets-alert"></div>

        <div class="table-panel d-none d-lg-block">
          <div class="table-responsive">
            <table class="table table-dark align-middle" id="tickets-table">
              <thead>
                <tr>
                  <th>Mã vé</th>
                  <th>Khách hàng</th>
                  <th>Phim</th>
                  <th>Suất chiếu</th>
                  <th>Ghế</th>
                  <th>Tổng tiền</th>
                  <th>Ngày đặt</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="tickets-table-body"></tbody>
            </table>
          </div>
        </div>

        <div class="row g-4 d-lg-none" id="ticket-card-list"></div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/Storage.js"></script>
    <script src="../Js/Main.js"></script>
    <script src="../Js/Tickets.js"></script>
  </body>
</html>
