<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineHub | Vé và combo đã đặt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../Css/Style.css" />
  </head>
  <body data-page="tickets">
    <div id="site-header"></div>

    <main class="section-spacing page-offset">
      <div class="container">
        <div class="page-title-block">
          <span class="section-subtitle">Lịch sử đặt vé</span>
          <h1>Vé đã đặt và combo đã đặt</h1>
        </div>

        <div id="tickets-alert"></div>

        <section class="mb-5">
          <div class="d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-ticket-perforated text-warning"></i>
            <h2 class="h4 mb-0">Vé đã đặt</h2>
          </div>

          <div class="table-panel d-none d-lg-block">
            <div class="table-responsive">
              <table class="table table-dark align-middle" id="tickets-table">
                <thead>
                  <tr>
                    <th>Mã vé</th>
                    <th>Khách hàng</th>
                    <th>Phim</th>
                    <th>Suất chiếu</th>
                    <th>Ghế</th>
                    <th>Combo</th>
                    <th>Tổng tiền</th>
                    <th>Ngày đặt</th>
                    <th>Thao tác</th>
                  </tr>
                </thead>
                <tbody id="tickets-table-body"></tbody>
              </table>
            </div>
          </div>

          <div class="row g-4 d-lg-none" id="ticket-card-list"></div>
        </section>

        <section>
          <div class="d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-cup-straw text-warning"></i>
            <h2 class="h4 mb-0">Combo đã đặt riêng</h2>
          </div>

          <div class="table-panel d-none d-lg-block">
            <div class="table-responsive">
              <table class="table table-dark align-middle" id="combo-orders-table">
                <thead>
                  <tr>
                    <th>Mã combo</th>
                    <th>Khách hàng</th>
                    <th>Chi tiết combo</th>
                    <th>Tổng tiền</th>
                    <th>Ngày đặt</th>
                    <th>Thao tác</th>
                  </tr>
                </thead>
                <tbody id="combo-orders-table-body"></tbody>
              </table>
            </div>
          </div>

          <div class="row g-4 d-lg-none" id="combo-order-card-list"></div>
        </section>
      </div>
    </main>

    <div class="modal fade" id="ticket-detail-modal" tabindex="-1" aria-labelledby="ticket-detail-modal-title" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content ticket-detail-modal-content">
          <div class="modal-header border-secondary-subtle">
            <div>
              <h2 class="h5 mb-1" id="ticket-detail-modal-title">Mã vé</h2>
              <p class="mb-0 small ticket-detail-subtitle" id="ticket-detail-modal-subtitle"></p>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <div class="ticket-qr-wrap mb-3">
              <img id="ticket-detail-qr-image" class="ticket-qr-image" src="" alt="QR vé" />
            </div>
            <div id="ticket-detail-info" class="summary-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/Storage.js"></script>
    <script src="../Js/Main.js"></script>
    <script src="../Js/Tickets.js"></script>
  </body>
</html>
