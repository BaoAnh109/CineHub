<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineHub | Danh sách phim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../Css/Style.css" />
  </head>
  <body data-page="movies">
    <div id="site-header"></div>

    <main class="section-spacing page-offset">
      <div class="container">
        <div class="page-title-block">
          <span class="section-subtitle">Danh sách phim</span>
          <h1>Chọn bộ phim bạn muốn xem</h1>
        </div>

        <div class="filter-panel mb-4">
          <div class="row g-3">
            <div class="col-lg-6">
              <label for="search-input" class="form-label">Tìm theo tên phim</label>
              <input
                type="text"
                class="form-control"
                id="search-input"
                placeholder="Ví dụ: Bình Minh Thiên Hà"
              />
            </div>
            <div class="col-lg-4">
              <label for="genre-filter" class="form-label">Lọc theo thể loại</label>
              <select class="form-select" id="genre-filter">
                <option value="all">Tất cả thể loại</option>
              </select>
            </div>
            <div class="col-lg-2 d-grid">
              <label class="form-label d-none d-lg-block">&nbsp;</label>
              <button id="reset-filter-btn" class="btn btn-cine-outline">Đặt lại</button>
            </div>
          </div>
        </div>

        <div id="movie-count" class="small text-light-emphasis mb-3"></div>
        <div class="row g-4" id="movies-list"></div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/Storage.js"></script>
    <script src="../Js/Main.js"></script>
    <script src="../Js/Movies.js"></script>
  </body>
</html>
